sonar.projectKey=compare-ai
sonar.projectName=compare-ai
sonar.sourceEncoding=UTF-8

# Monorepo sources
sonar.sources=backend/src,frontend-react/src,frontend-vue/src

# Common exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.vite/**,**/*.spec.ts

# Optional coverage reports (generate before scan if available)
sonar.javascript.lcov.reportPaths=frontend-react/coverage/lcov.info,frontend-vue/coverage/lcov.info
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info
